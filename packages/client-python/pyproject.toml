[project]
name = "rfnry-chat-client"
version = "0.2.1"
description = "rfnry/chat — python client"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    {name = "rfnry", email = "contact@rfnry.dev"},
]
keywords = [
    "rfnry",
    "chat",
    "assistant",
    "agent",
    "sdk",
    "ai",
    "python"
]

dependencies = [
    "pydantic>=2.13.2",
    "python-socketio>=5.16.1",
    "aiohttp>=3.13.5",
    "httpx>=0.28.1",
    "rfnry-chat-protocol",
]

[tool.uv.sources]
rfnry-chat-protocol = { path = "../../../types/packages/chat-python", editable = true }
rfnry-chat-server = { path = "../server-python", editable = true }

[project.urls]
Repository = "https://github.com/rfnry/chat"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rfnry_chat_client"]

[project.optional-dependencies]
dev = [
    "mypy>=1.20.1",
    "poethepoet>=0.44.0",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "build>=1.4.3",
    "rfnry-chat-server",
    "asyncpg>=0.31.0",
    "fastapi>=0.136.0",
    "uvicorn>=0.44.0",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.format]
quote-style = "double"

[[tool.mypy.overrides]]
module = ["socketio", "socketio.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]

[tool.poe.tasks]
format = "ruff format ."
"format:imports" = "ruff check --select I --fix ."
check = "ruff check ."
"check:fix" = "ruff check --fix ."
typecheck = "mypy src/rfnry_chat_client"
test = "pytest"
"test:cov" = "pytest --cov=src --cov-report=term-missing"
dev = ["check", "typecheck", "test"]
build = "python -m build"
