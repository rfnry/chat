name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'server-python-v')
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
        working-directory: packages/server-python
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/server-python/dist
